<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Posyandu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #000;
        }

        /* NAVBAR */
        .navbar {
            background: #fff;
            padding: 15px 40px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }

        .nav-left span {
            margin-right: 20px;
            cursor: pointer;
        }

        .nav-left span.active {
            font-weight: bold;
            border-bottom: 2px solid #000;
        }

        /* CONTAINER */
        .container {
            padding: 30px 40px;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .card h3 {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
        }

        /* QUICK ACTION */
        .actions {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .actions h3 {
            margin-bottom: 15px;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .buttons button {
            padding: 10px 15px;
            border: 1px solid #000;
            background: #fff;
            cursor: pointer;
            border-radius: 5px;
        }

        .buttons button:hover {
            background: #000;
            color: #fff;
        }

        /* BOTTOM SECTION */
        .bottom {
            display: flex;
            gap: 20px;
        }

        .box {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .progress {
            height: 8px;
            background: #ddd;
            border-radius: 5px;
            margin: 5px 0 15px;
        }

        .progress-bar {
            height: 8px;
            width: 0%;
            background: #000;
            border-radius: 5px;
        }

        .small {
            font-size: 12px;
            color: #555;
        }

        .right-text {
            text-align: right;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="nav-left">
            <span class="active">Dashboard</span>
            <span>Pasien</span>
            <span>Pemeriksaan</span>
            <span>Laporan</span>
            <span>Konsultasi</span>
            <span>Edukasi</span>
        </div>
        <div>Kader Posyandu</div>
    </div>

    <!-- CONTENT -->
    <div class="container">
        <h1>Dashboard Kader Posyandu</h1>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">
                <h3>Total Pasien</h3>
                <p>0</p>
            </div>
            <div class="card">
                <h3>Pemeriksaan Hari Ini</h3>
                <p>0</p>
            </div>
            <div class="card">
                <h3>Pemeriksaan Bulan Ini</h3>
                <p>0</p>
            </div>
        </div>

        <!-- QUICK ACTION -->
        <div class="actions">
            <h3>Aksi Cepat</h3>
            <div class="buttons">
                <button>Tambah Pasien Baru</button>
                <button>Input Pemeriksaan</button>
                <button>Daftar Pasien</button>
                <button>Laporan</button>
            </div>
        </div>

        <!-- BOTTOM -->
        <div class="bottom">
            <div class="box">
                <h3>Kategori Pasien</h3>

                <p>Balita</p>
                <div class="progress">
                    <div class="progress-bar"></div>
                </div>

                <p>Ibu Hamil</p>
                <div class="progress">
                    <div class="progress-bar"></div>
                </div>

                <p>Lansia</p>
                <div class="progress">
                    <div class="progress-bar"></div>
                </div>
            </div>

            <div class="box">
                <div class="right-text">Lihat Semua →</div>
                <h3>Pemeriksaan Terakhir</h3>
                <p class="small">Belum ada data pemeriksaan.</p>
            </div>
        </div>
    </div>

</body>

</html>
